services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mem0-qdrant
    restart: on-failure
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  mem0-mcp:
    build: ./app
    container_name: mem0-mcp
    restart: on-failure
    ports:
      - "127.0.0.1:8888:8080"
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      - qdrant
    volumes:
      - ./data/history:/app/history
